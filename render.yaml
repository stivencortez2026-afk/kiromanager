services:
  - type: web
    name: kiro-gateway
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app -c gunicorn_conf.py
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: KIRO_ACCOUNTS
        sync: false
      - key: GATEWAY_API_KEY
        sync: false
      - key: KIRO_REGION
        value: "us-east-1"
      - key: MAX_RETRIES
        value: "3"
      - key: REQUEST_TIMEOUT
        value: "300"
      - key: ACCOUNT_COOLDOWN_SECONDS
        value: "300"
      - key: WEB_CONCURRENCY
        value: "2"
      - key: GUNICORN_TIMEOUT
        value: "300"
